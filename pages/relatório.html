<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const canvas = document.getElementById('meuGrafico');

new Chart(canvas, {
    type: 'bar',
    data: {
        labels: ['Em Manutenção', 'Concluídos', 'Aguardando Peças', 'Pendentes'],
        datasets: [{
            label: 'Manutenções por Status',
            data: [5, 8, 2, 1],
            backgroundColor: ['red', 'green', 'blue', 'yellow']
        }]
    },
    options: {
        plugins: {
            legend: {
                labels: {
                    boxWidth: 0,
                    boxHeight: 0,
                    color: '#ffffff'
                }
            },
            title: {
                display: true,
                text: 'Número de Manutenções por Status',
                color: '#ffffff'
            }
        },
        scales: {
            x: {
                ticks: {
                    color: '#ffffff' // legenda eixo X
                },
                grid: {
                    color: '#444444'
                }
            },
            y: {
                ticks: {
                    color: '#ffffff' // legenda eixo Y
                },
                grid: {
                    color: '#444444'
                }
            }
        }
    }
});

</script>
